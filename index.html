<!DOCTYPE html>

<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Finora</title>

    <!-- FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap"
        rel="stylesheet" />

    <!-- ICONS -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- CSS -->

    <style>
        /* =========================
   RESET
========================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {

            font-family: 'Vazirmatn', sans-serif;

            background:
                linear-gradient(180deg,
                    #0f172a,
                    #111827,
                    #09090f);

            color: white;

            min-height: 100vh;

            overflow-x: hidden;
        }

        /* =========================
   APP
========================= */

        .app-shell {

            max-width: 520px;

            margin: auto;

            padding:
                20px 18px 120px;
        }

        /* =========================
   GLASS
========================= */

        .glass {

            background:
                rgba(255, 255, 255, 0.06);

            backdrop-filter: blur(18px);

            border:
                1px solid rgba(255, 255, 255, 0.08);

            border-radius: 28px;

            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.25);
        }

        /* =========================
   PAGES
========================= */

        .page {
            display: none;
        }

        .page.active-page {

            display: block;

            animation: pageShow 0.45s ease;
        }

        @keyframes pageShow {

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        /* =========================
   TOPBAR
========================= */

        .topbar {

            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 25px;
        }

        .hello-text {
            opacity: 0.7;
            margin-bottom: 6px;
        }

        .username {
            font-size: 28px;
        }

        .icon-btn {

            width: 55px;
            height: 55px;

            border: none;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;

            cursor: pointer;
        }

        /* =========================
   BALANCE
========================= */

        .balance-card {

            position: relative;

            overflow: hidden;

            padding: 28px;

            margin-bottom: 22px;
        }

        .balance-content {

            position: relative;
            z-index: 2;
        }

        .balance-content p {

            opacity: 0.7;

            margin-bottom: 12px;
        }

        .balance-content h1 {

            font-size: 38px;

            font-weight: 800;
        }

        .balance-glow {

            position: absolute;

            width: 220px;
            height: 220px;

            border-radius: 50%;

            background:
                radial-gradient(rgba(106, 92, 255, 0.55),
                    transparent);

            top: -80px;
            left: -50px;

            filter: blur(20px);
        }

        /* =========================
   STATS
========================= */

        .stats-grid {

            display: grid;

            grid-template-columns:
                repeat(2, 1fr);

            gap: 16px;

            margin-bottom: 22px;
        }

        .stat-card {

            padding: 20px;

            display: flex;
            align-items: center;

            gap: 15px;
        }

        .stat-icon {

            width: 55px;
            height: 55px;

            border-radius: 18px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 22px;
        }

        .income-card .stat-icon {

            background:
                rgba(0, 255, 170, 0.15);

            color: #00ffbf;
        }

        .expense-card .stat-icon {

            background:
                rgba(255, 60, 120, 0.15);

            color: #ff5d7d;
        }

        /* =========================
   SECTIONS
========================= */

        .transactions-card,
        .chart-card,
        .weekly-card,
        .ai-chat-box,
        .profile-card {

            padding: 22px;

            margin-bottom: 22px;
        }

        .section-header {

            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 20px;
        }

        .small-btn {

            width: 42px;
            height: 42px;

            border: none;

            color: white;

            cursor: pointer;
        }

        /* =========================
   TRANSACTIONS
========================= */

        .transaction-item {

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 16px;

            margin-bottom: 14px;

            border-radius: 22px;

            background:
                rgba(255, 255, 255, 0.05);
        }

        .transaction-left {

            display: flex;
            align-items: center;

            gap: 14px;
        }

        .transaction-icon {

            width: 54px;
            height: 54px;

            border-radius: 18px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 20px;
        }

        .transaction-icon.income {

            background:
                rgba(0, 255, 170, 0.15);

            color: #00ffbf;
        }

        .transaction-icon.expense {

            background:
                rgba(255, 60, 120, 0.15);

            color: #ff5d7d;
        }

        .transaction-right {

            text-align: left;
        }

        .transaction-right h3 {

            margin-bottom: 10px;
        }

        .transaction-right button {

            width: 36px;
            height: 36px;

            border: none;

            border-radius: 12px;

            background:
                rgba(255, 255, 255, 0.08);

            color: #ff5d7d;

            cursor: pointer;
        }

        /* =========================
   EMPTY
========================= */

        .empty-state {

            text-align: center;

            padding: 40px 20px;

            opacity: 0.7;
        }

        .empty-state i {

            font-size: 50px;

            margin-bottom: 16px;

            color: #6a5cff;
        }

        /* =========================
   PAGE HEADER
========================= */

        .page-header {

            margin-bottom: 25px;
        }

        .page-header h2 {

            font-size: 32px;

            margin-bottom: 8px;
        }

        .page-header p {
            opacity: 0.7;
        }

        /* =========================
   ANALYTICS
========================= */

        .pie-chart {

            width: 240px;
            height: 240px;

            margin: auto;

            border-radius: 50%;

            background:
                conic-gradient(#6a5cff 0% 40%,
                    #00d2ff 40% 70%,
                    #ff3cac 70% 100%);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pie-center {

            width: 140px;
            height: 140px;

            border-radius: 50%;

            background: #111827;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .weekly-card {
            padding: 22px;
        }

        #weeklyChart {

            display: flex;
            align-items: flex-end;

            gap: 10px;

            height: 220px;
        }

        .bar {

            flex: 1;

            display: flex;
            align-items: flex-end;
        }

        .bar div {

            width: 100%;

            border-radius: 18px 18px 0 0;

            background:
                linear-gradient(to top,
                    #00d2ff,
                    #6a5cff,
                    #ff3cac);
        }

        .insight-card {

            padding: 20px;

            display: flex;
            align-items: center;

            gap: 15px;
        }

        .insight-icon {

            width: 60px;
            height: 60px;

            border-radius: 18px;

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #ff3cac);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =========================
   BUDGET
========================= */

        #budgetContainer {

            display: grid;

            gap: 18px;
        }

        .budget-card {

            padding: 22px;
        }

        .budget-info {

            margin-bottom: 16px;
        }

        .budget-progress {

            width: 100%;
            height: 14px;

            border-radius: 20px;

            overflow: hidden;

            background:
                rgba(255, 255, 255, 0.08);
        }

        .budget-progress-fill {

            height: 100%;

            border-radius: 20px;

            background:
                linear-gradient(90deg,
                    #00d2ff,
                    #6a5cff,
                    #ff3cac);
        }

        /* =========================
   AI
========================= */

        .ai-orb-wrapper {

            display: flex;
            justify-content: center;

            margin: 35px 0;
        }

        .ai-orb {

            position: relative;

            width: 180px;
            height: 180px;
        }

        .orb-core {

            position: absolute;

            inset: 25px;

            border-radius: 50%;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 48px;

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #00d2ff,
                    #ff3cac);

            box-shadow:
                0 0 50px rgba(106, 92, 255, 0.55);

            animation: orbPulse 3s infinite;
        }

        @keyframes orbPulse {

            50% {
                transform: scale(1.08);
            }

        }

        .orb-ring {

            position: absolute;

            inset: 0;

            border-radius: 50%;

            border:
                1px solid rgba(255, 255, 255, 0.15);

            animation: spin 10s linear infinite;
        }

        @keyframes spin {

            to {
                transform: rotate(360deg);
            }

        }

        .ai-message,
        .user-message {

            display: flex;

            gap: 14px;

            margin-bottom: 16px;
        }

        .user-message {
            justify-content: flex-end;
        }

        .ai-avatar {

            width: 48px;
            height: 48px;

            border-radius: 16px;

            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #00d2ff);
        }

        .message-content {

            max-width: 75%;

            padding: 16px;

            border-radius: 22px;

            background:
                rgba(255, 255, 255, 0.06);
        }

        .user-message .message-content {

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #ff3cac);
        }

        /* INPUT */

        .ai-input-container {

            padding: 14px;

            display: flex;
            align-items: center;

            gap: 12px;

            margin-bottom: 25px;
        }

        .ai-input-container input {

            flex: 1;

            border: none;
            outline: none;

            background: none;

            color: white;

            font-size: 16px;
        }

        .ai-input-container button {

            width: 50px;
            height: 50px;

            border: none;

            border-radius: 16px;

            color: white;

            cursor: pointer;

            background:
                rgba(255, 255, 255, 0.08);
        }

        #sendAiBtn {

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #ff3cac);
        }

        /* =========================
   PROFILE
========================= */

        .profile-card {

            text-align: center;
        }

        .profile-card img {

            width: 110px;
            height: 110px;

            border-radius: 50%;

            margin-bottom: 18px;
        }

        .profile-card h2 {

            margin-bottom: 8px;
        }

        .profile-card p {
            opacity: 0.7;
        }

        .settings-list {

            display: grid;

            gap: 16px;
        }

        .setting-item {

            padding: 18px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-left {

            display: flex;
            align-items: center;

            gap: 14px;
        }

        .setting-icon {

            width: 52px;
            height: 52px;

            border-radius: 16px;

            display: flex;
            justify-content: center;
            align-items: center;

            background:
                rgba(255, 255, 255, 0.08);
        }

        /* SWITCH */

        .switch {

            position: relative;

            width: 58px;
            height: 32px;
        }

        .switch input {
            display: none;
        }

        .slider {

            position: absolute;

            inset: 0;

            border-radius: 30px;

            background:
                rgba(255, 255, 255, 0.12);

            cursor: pointer;
        }

        .slider::before {

            content: '';

            position: absolute;

            width: 24px;
            height: 24px;

            border-radius: 50%;

            background: white;

            top: 4px;
            left: 4px;

            transition: 0.3s;
        }

        .switch input:checked+.slider {

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #ff3cac);
        }

        .switch input:checked+.slider::before {

            transform: translateX(26px);
        }

        /* =========================
   MODAL
========================= */

        .modal-overlay {

            position: fixed;

            inset: 0;

            background:
                rgba(0, 0, 0, 0.55);

            display: none;

            justify-content: center;
            align-items: flex-end;

            padding: 18px;

            z-index: 999;
        }

        .modal-overlay.active-modal {

            display: flex;
        }

        .transaction-modal {

            width: 100%;

            padding: 24px;

            border-radius: 32px 32px 0 0;

            animation: modalShow 0.35s ease;
        }

        @keyframes modalShow {

            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }

        }

        /* FORM */

        .type-switch {

            display: grid;

            grid-template-columns:
                repeat(2, 1fr);

            gap: 12px;

            margin-bottom: 20px;
        }

        .type-btn {

            border: none;

            padding: 16px;

            border-radius: 18px;

            color: white;

            cursor: pointer;

            background:
                rgba(255, 255, 255, 0.06);
        }

        .type-btn.active {

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #ff3cac);
        }

        .input-group {

            margin-bottom: 18px;
        }

        .input-group label {

            display: block;

            margin-bottom: 10px;

            opacity: 0.75;
        }

        .input-group input,
        .input-group textarea {

            width: 100%;

            border: none;
            outline: none;

            padding: 16px;

            border-radius: 18px;

            background:
                rgba(255, 255, 255, 0.06);

            color: white;

            font-family: inherit;
        }

        .input-group textarea {

            min-height: 110px;

            resize: none;
        }

        /* CATEGORY */

        .categories-grid {

            display: grid;

            grid-template-columns:
                repeat(2, 1fr);

            gap: 12px;
        }

        .category-btn {

            border: none;

            padding: 16px;

            border-radius: 18px;

            color: white;

            cursor: pointer;

            background:
                rgba(255, 255, 255, 0.06);
        }

        .category-btn.active {

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #00d2ff);
        }

        /* SAVE */

        .save-transaction-btn {

            width: 100%;

            border: none;

            padding: 18px;

            border-radius: 22px;

            color: white;

            font-size: 16px;

            cursor: pointer;

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #ff3cac);
        }

        /* =========================
   FLOAT BTN
========================= */

        .floating-add-btn {

            position: fixed;

            bottom: 95px;
            left: 50%;

            transform: translateX(-50%);

            width: 70px;
            height: 70px;

            border: none;

            border-radius: 50%;

            color: white;

            font-size: 24px;

            cursor: pointer;

            z-index: 500;

            background:
                linear-gradient(135deg,
                    #6a5cff,
                    #ff3cac);

            box-shadow:
                0 10px 40px rgba(106, 92, 255, 0.5);
        }

        /* =========================
   NAV
========================= */

        .bottom-nav {

            position: fixed;

            bottom: 18px;
            left: 50%;

            transform: translateX(-50%);

            width: 95%;
            max-width: 520px;

            padding: 14px;

            border-radius: 28px;

            background:
                rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(18px);

            border:
                1px solid rgba(255, 255, 255, 0.08);

            display: flex;
            justify-content: space-around;

            z-index: 900;
        }

        .nav-item {

            border: none;

            background: none;

            color: white;

            display: flex;
            flex-direction: column;
            align-items: center;

            gap: 8px;

            cursor: pointer;

            opacity: 0.6;

            transition: 0.3s;
        }

        .nav-item.active {

            opacity: 1;

            transform: translateY(-4px);
        }

        /* =========================
   LIGHT MODE
========================= */

        body.light-mode {

            background:
                linear-gradient(180deg,
                    #eef2ff,
                    #f8fafc);

            color: #111827;
        }

        body.light-mode .glass {

            background:
                rgba(255, 255, 255, 0.55);

            border:
                1px solid rgba(255, 255, 255, 0.45);

            color: #111827;
        }

        body.light-mode input,
        body.light-mode textarea {

            color: #111827;
        }

        body.light-mode .nav-item,
        body.light-mode .icon-btn {

            color: #111827;
        }

        body.light-mode .pie-center {

            background: white;
        }
    </style>

</head>

<body>

    <!-- APP -->

    <div class="app-shell">

        <!-- =========================
         HOME PAGE
    ========================== -->

        <section class="page active-page" id="homePage" data-page="home">

            <!-- TOPBAR -->

            <header class="topbar">

                <div>

                    <p class="hello-text">
                        خوش اومدی 👋
                    </p>

                    <h2 class="username">
                        Shayan
                    </h2>

                </div>

                <button class="glass icon-btn">

                    <i class="fa-solid fa-bell"></i>

                </button>

            </header>

            <!-- BALANCE -->

            <section class="glass balance-card">

                <div class="balance-content">

                    <p>موجودی کل</p>

                    <h1 id="balanceAmount">
                        ۰ تومان
                    </h1>

                </div>

                <div class="balance-glow"></div>

            </section>

            <!-- STATS -->

            <section class="stats-grid">

                <div class="glass stat-card income-card">

                    <div class="stat-icon">

                        <i class="fa-solid fa-arrow-trend-up"></i>

                    </div>

                    <div>

                        <p>درآمد</p>

                        <h2 id="incomeAmount">
                            ۰
                        </h2>

                    </div>

                </div>

                <div class="glass stat-card expense-card">

                    <div class="stat-icon">

                        <i class="fa-solid fa-arrow-trend-down"></i>

                    </div>

                    <div>

                        <p>هزینه</p>

                        <h2 id="expenseAmount">
                            ۰
                        </h2>

                    </div>

                </div>

            </section>

            <!-- TRANSACTIONS -->

            <section class="glass transactions-card">

                <div class="section-header">

                    <h3>
                        تراکنش‌ها
                    </h3>

                    <button class="glass small-btn">

                        <i class="fa-solid fa-sliders"></i>

                    </button>

                </div>

                <div id="transactionsContainer">

                    <!-- RENDER -->

                </div>

            </section>

        </section>

        <!-- =========================
         ANALYTICS PAGE
    ========================== -->

        <section class="page" id="analyticsPage" data-page="analytics">

            <div class="page-header">

                <h2>تحلیل مالی</h2>

                <p>
                    تحلیل هوشمند هزینه‌ها
                </p>

            </div>

            <!-- PIE -->

            <section class="glass chart-card">

                <div class="section-header">

                    <h3>
                        دسته‌بندی هزینه‌ها
                    </h3>

                    <span>
                        این ماه
                    </span>

                </div>

                <div id="analyticsPieChart">

                    <!-- RENDER -->

                </div>

            </section>

            <!-- WEEK -->

            <section class="glass weekly-card">

                <div class="section-header">

                    <h3>
                        هزینه هفتگی
                    </h3>

                </div>

                <div id="weeklyChart">

                    <!-- RENDER -->

                </div>

            </section>

            <!-- INSIGHT -->

            <section class="glass insight-card" id="analyticsInsight">

                <!-- RENDER -->

            </section>

        </section>

        <!-- =========================
         BUDGET PAGE
    ========================== -->

        <section class="page" id="budgetPage" data-page="budget">

            <div class="page-header">

                <h2>بودجه‌بندی</h2>

                <p>
                    مدیریت سقف هزینه‌ها
                </p>

            </div>

            <div id="budgetContainer">

                <!-- RENDER -->

            </div>

        </section>

        <!-- =========================
         AI PAGE
    ========================== -->

        <section class="page" id="aiPage" data-page="ai">

            <div class="page-header">

                <h2>Finora AI</h2>

                <p>
                    دستیار هوشمند مالی
                </p>

            </div>

            <!-- AI ORB -->

            <div class="ai-orb-wrapper">

                <div class="ai-orb">

                    <div class="orb-ring"></div>

                    <div class="orb-core">

                        <i class="fa-solid fa-brain"></i>

                    </div>

                </div>

            </div>

            <!-- CHAT -->

            <section class="glass ai-chat-box" id="aiChatBox">

                <!-- RENDER -->

            </section>

            <!-- INPUT -->

            <section class="glass ai-input-container">

                <button id="voiceBtn">

                    <i class="fa-solid fa-microphone"></i>

                </button>

                <input type="text" id="aiInput" placeholder="سوالی بپرس..." />

                <button id="sendAiBtn">

                    <i class="fa-solid fa-paper-plane"></i>

                </button>

            </section>

        </section>

        <!-- =========================
         PROFILE PAGE
    ========================== -->

        <section class="page" id="profilePage" data-page="profile">

            <!-- PROFILE -->

            <section class="glass profile-card">

                <img src="https://i.pravatar.cc/300" alt="" />

                <h2>Shayan</h2>

                <p>
                    Premium Member
                </p>

            </section>

            <!-- SETTINGS -->

            <section class="settings-list">

                <!-- THEME -->

                <div class="glass setting-item">

                    <div class="setting-left">

                        <div class="setting-icon">

                            <i class="fa-solid fa-moon"></i>

                        </div>

                        <div>

                            <h4>
                                Dark Mode
                            </h4>

                            <p>
                                حالت تاریک
                            </p>

                        </div>

                    </div>

                    <label class="switch">

                        <input type="checkbox" id="themeToggle" checked />

                        <span class="slider"></span>

                    </label>

                </div>

                <!-- NOTIFICATION -->

                <div class="glass setting-item">

                    <div class="setting-left">

                        <div class="setting-icon">

                            <i class="fa-solid fa-bell"></i>

                        </div>

                        <div>

                            <h4>
                                Notifications
                            </h4>

                            <p>
                                اعلان‌ها
                            </p>

                        </div>

                    </div>

                    <label class="switch">

                        <input type="checkbox" checked />

                        <span class="slider"></span>

                    </label>

                </div>

            </section>

        </section>

        <!-- =========================
         ADD TRANSACTION MODAL
    ========================== -->

        <div class="modal-overlay" id="transactionModal">

            <div class="glass transaction-modal">

                <!-- HEADER -->

                <div class="section-header">

                    <h3>
                        تراکنش جدید
                    </h3>

                    <button class="glass small-btn" id="closeModalBtn">

                        <i class="fa-solid fa-xmark"></i>

                    </button>

                </div>

                <!-- TYPE -->

                <div class="type-switch">

                    <button class="type-btn active" data-type="expense">

                        هزینه

                    </button>

                    <button class="type-btn" data-type="income">

                        درآمد

                    </button>

                </div>

                <!-- AMOUNT -->

                <div class="input-group">

                    <label>
                        مبلغ
                    </label>

                    <input type="number" id="transactionAmount" placeholder="مثلاً 250000" />

                </div>

                <!-- CATEGORY -->

                <div class="input-group">

                    <label>
                        دسته‌بندی
                    </label>

                    <div class="categories-grid">

                        <button class="category-btn active" data-category="food">

                            🍔 خوراک

                        </button>

                        <button class="category-btn" data-category="transport">

                            🚕 حمل و نقل

                        </button>

                        <button class="category-btn" data-category="shopping">

                            🛍 خرید

                        </button>

                        <button class="category-btn" data-category="fun">

                            🎮 سرگرمی

                        </button>

                        <button class="category-btn" data-category="salary">

                            💼 حقوق

                        </button>

                        <button class="category-btn" data-category="other">

                            🎁 سایر

                        </button>

                    </div>

                </div>

                <!-- NOTE -->

                <div class="input-group">

                    <label>
                        توضیحات
                    </label>

                    <textarea id="transactionNote" placeholder="توضیح..."></textarea>

                </div>

                <!-- SAVE -->

                <button class="save-transaction-btn" id="saveTransactionBtn">

                    ذخیره تراکنش

                </button>

            </div>

        </div>

        <!-- =========================
         FLOATING ACTION BUTTON
    ========================== -->

        <button class="floating-add-btn" id="openModalBtn">

            <i class="fa-solid fa-plus"></i>

        </button>

        <!-- =========================
         BOTTOM NAVIGATION
    ========================== -->

        <nav class="bottom-nav">

            <button class="nav-item active" data-nav="home">

                <i class="fa-solid fa-house"></i>

                <span>
                    خانه
                </span>

            </button>

            <button class="nav-item" data-nav="analytics">

                <i class="fa-solid fa-chart-pie"></i>

                <span>
                    تحلیل
                </span>

            </button>

            <button class="nav-item" data-nav="budget">

                <i class="fa-solid fa-wallet"></i>

                <span>
                    بودجه
                </span>

            </button>

            <button class="nav-item" data-nav="ai">

                <i class="fa-solid fa-brain"></i>

                <span>
                    AI
                </span>

            </button>

            <button class="nav-item" data-nav="profile">

                <i class="fa-solid fa-user"></i>

                <span>
                    پروفایل
                </span>

            </button>

        </nav>

    </div>

    <!-- JS -->

    <script>
        /* =========================
   FINORA APP
========================= */

        /* =========================
           STATE
        ========================= */

        const state = {

            currentPage: 'home',

            theme: localStorage.getItem('theme') ||
                'dark',

            transactions: JSON.parse(
                localStorage.getItem('transactions')
            ) || []

        };

        /* =========================
           DOM
        ========================= */

        /* PAGES */

        const pages =
            document.querySelectorAll('.page');

        const navItems =
            document.querySelectorAll('.nav-item');

        /* BALANCE */

        const balanceAmount =
            document.getElementById('balanceAmount');

        const incomeAmount =
            document.getElementById('incomeAmount');

        const expenseAmount =
            document.getElementById('expenseAmount');

        /* TRANSACTIONS */

        const transactionsContainer =
            document.getElementById(
                'transactionsContainer'
            );

        /* MODAL */

        const transactionModal =
            document.getElementById(
                'transactionModal'
            );

        const openModalBtn =
            document.getElementById(
                'openModalBtn'
            );

        const closeModalBtn =
            document.getElementById(
                'closeModalBtn'
            );

        const saveTransactionBtn =
            document.getElementById(
                'saveTransactionBtn'
            );

        /* FORM */

        const transactionAmount =
            document.getElementById(
                'transactionAmount'
            );

        const transactionNote =
            document.getElementById(
                'transactionNote'
            );

        const typeButtons =
            document.querySelectorAll('.type-btn');

        const categoryButtons =
            document.querySelectorAll('.category-btn');

        /* THEME */

        const themeToggle =
            document.getElementById(
                'themeToggle'
            );

        /* AI */

        const aiInput =
            document.getElementById('aiInput');

        const sendAiBtn =
            document.getElementById('sendAiBtn');

        const aiChatBox =
            document.getElementById('aiChatBox');

        /* ANALYTICS */

        const analyticsPieChart =
            document.getElementById(
                'analyticsPieChart'
            );

        const analyticsInsight =
            document.getElementById(
                'analyticsInsight'
            );

        const weeklyChart =
            document.getElementById(
                'weeklyChart'
            );

        /* BUDGET */

        const budgetContainer =
            document.getElementById(
                'budgetContainer'
            );

        /* =========================
           APP VARIABLES
        ========================= */

        let currentType = 'expense';

        let currentCategory = 'food';

        /* =========================
           INIT
        ========================= */

        function init() {

            setupTheme();

            renderAll();

            setupNavigation();

            setupModal();

            setupTransactionType();

            setupCategories();

            setupSaveTransaction();

            setupThemeToggle();

            setupAI();

        }

        init();

        /* =========================
           NAVIGATION
        ========================= */

        function setupNavigation() {

            navItems.forEach((item) => {

                item.addEventListener('click', () => {

                    const page =
                        item.dataset.nav;

                    state.currentPage = page;

                    /* NAV ACTIVE */

                    navItems.forEach((nav) => {

                        nav.classList.remove('active');

                    });

                    item.classList.add('active');

                    /* PAGE ACTIVE */

                    pages.forEach((pageItem) => {

                        pageItem.classList.remove(
                            'active-page'
                        );

                    });

                    document
                        .querySelector(
                            `[data-page="${page}"]`
                        )
                        .classList.add('active-page');

                });

            });

        }

        /* =========================
           MODAL
        ========================= */

        function setupModal() {

            openModalBtn.addEventListener(
                'click',
                () => {

                    transactionModal.classList.add(
                        'active-modal'
                    );

                }
            );

            closeModalBtn.addEventListener(
                'click',
                closeModal
            );

            transactionModal.addEventListener(
                'click',
                (e) => {

                    if (
                        e.target === transactionModal
                    ) {

                        closeModal();

                    }

                }
            );

        }

        function closeModal() {

            transactionModal.classList.remove(
                'active-modal'
            );

        }

        /* =========================
           TRANSACTION TYPE
        ========================= */

        function setupTransactionType() {

            typeButtons.forEach((btn) => {

                btn.addEventListener('click', () => {

                    typeButtons.forEach((button) => {

                        button.classList.remove(
                            'active'
                        );

                    });

                    btn.classList.add('active');

                    currentType =
                        btn.dataset.type;

                });

            });

        }

        /* =========================
           CATEGORIES
        ========================= */

        function setupCategories() {

            categoryButtons.forEach((btn) => {

                btn.addEventListener('click', () => {

                    categoryButtons.forEach((button) => {

                        button.classList.remove(
                            'active'
                        );

                    });

                    btn.classList.add('active');

                    currentCategory =
                        btn.dataset.category;

                });

            });

        }

        /* =========================
           SAVE TRANSACTION
        ========================= */

        function setupSaveTransaction() {

            saveTransactionBtn.addEventListener(
                'click',
                saveTransaction
            );

        }

        function saveTransaction() {

            const amount =
                Number(transactionAmount.value);

            const note =
                transactionNote.value.trim();

            if (!amount || amount <= 0) {

                alert('مبلغ معتبر وارد کن');

                return;

            }

            const transaction = {

                id: crypto.randomUUID(),

                amount,

                note,

                category: currentCategory,

                type: currentType,

                createdAt: Date.now()

            };

            state.transactions.unshift(
                transaction
            );

            persistTransactions();

            renderAll();

            resetForm();

            closeModal();

        }

        /* =========================
           RESET FORM
        ========================= */

        function resetForm() {

            transactionAmount.value = '';

            transactionNote.value = '';

            currentType = 'expense';

            currentCategory = 'food';

        }

        /* =========================
           STORAGE
        ========================= */

        function persistTransactions() {

            localStorage.setItem(
                'transactions',
                JSON.stringify(
                    state.transactions
                )
            );

        }

        /* =========================
           RENDER ALL
        ========================= */

        function renderAll() {

            renderDashboard();

            renderTransactions();

            renderAnalytics();

            renderBudgets();

            renderAI();

        }

        /* =========================
           DASHBOARD
        ========================= */

        function renderDashboard() {

            const income =
                state.transactions
                .filter((t) =>
                    t.type === 'income'
                )
                .reduce((acc, item) => {

                    return acc + item.amount;

                }, 0);

            const expense =
                state.transactions
                .filter((t) =>
                    t.type === 'expense'
                )
                .reduce((acc, item) => {

                    return acc + item.amount;

                }, 0);

            const balance =
                income - expense;

            balanceAmount.innerHTML =
                `${formatMoney(balance)} تومان`;

            incomeAmount.innerHTML =
                formatMoney(income);

            expenseAmount.innerHTML =
                formatMoney(expense);

        }

        /* =========================
           TRANSACTIONS
        ========================= */

        function renderTransactions() {

            if (
                state.transactions.length === 0
            ) {

                transactionsContainer.innerHTML =

                    `
      <div class="empty-state">

        <i class="fa-solid fa-wallet"></i>

        <h3>
          هنوز تراکنشی نداری
        </h3>

      </div>
    `;

                return;

            }

            transactionsContainer.innerHTML = '';

            state.transactions.forEach(
                (transaction) => {

                    const item =
                        document.createElement('div');

                    item.classList.add(
                        'transaction-item'
                    );

                    const icon =
                        transaction.type === 'income' ?
                        'fa-arrow-trend-up' :
                        'fa-arrow-trend-down';

                    item.innerHTML =

                        `
        <div class="transaction-left">

          <div class="
            transaction-icon
            ${transaction.type}
          ">

            <i class="
              fa-solid
              ${icon}
            "></i>

          </div>

          <div>

            <h4>
              ${translateCategory(
                transaction.category
              )}
            </h4>

            <p>
              ${
                transaction.note ||
                'بدون توضیح'
              }
            </p>

          </div>

        </div>

        <div class="transaction-right">

          <h3>

            ${
              transaction.type ===
              'income'
              ? '+'
              : '-'
            }

            ${formatMoney(
              transaction.amount
            )}

          </h3>

          <button
            onclick="
              deleteTransaction(
                '${transaction.id}'
              )
            "
          >

            <i class="
              fa-solid fa-trash
            "></i>

          </button>

        </div>
      `;

                    transactionsContainer.appendChild(
                        item
                    );

                });

        }

        /* =========================
           DELETE
        ========================= */

        function deleteTransaction(id) {

            state.transactions =
                state.transactions.filter(
                    (transaction) => {

                        return transaction.id !== id;

                    }
                );

            persistTransactions();

            renderAll();

        }

        /* =========================
           ANALYTICS
        ========================= */

        function renderAnalytics() {

            const expenseTransactions =
                state.transactions.filter(
                    (transaction) => {

                        return transaction.type ===
                            'expense';

                    }
                );

            const categoryTotals = {

                food: 0,

                transport: 0,

                shopping: 0,

                fun: 0,

                other: 0

            };

            expenseTransactions.forEach(
                (transaction) => {

                    if (
                        categoryTotals[
                            transaction.category
                        ] !== undefined
                    ) {

                        categoryTotals[
                            transaction.category
                        ] += transaction.amount;

                    }

                }
            );

            const totalExpenses =
                Object.values(
                    categoryTotals
                ).reduce((a, b) => a + b, 0);

            /* PIE */

            analyticsPieChart.innerHTML =

                `
    <div class="pie-chart">

      <div class="pie-center">

        <h2>
          ${
            totalExpenses > 0
            ? '100%'
            : '0%'
          }
        </h2>

        <p>
          هزینه‌ها
        </p>

      </div>

    </div>
  `;

            /* INSIGHT */

            analyticsInsight.innerHTML =

                `
    <div class="insight-icon">

      <i class="
        fa-solid fa-sparkles
      "></i>

    </div>

    <div>

      <h3>
        تحلیل هوشمند
      </h3>

      <p>

        ${
          totalExpenses > 0
          ? `
            بیشترین هزینه شما در
            دسته
            ${
              translateCategory(
                getTopCategory(
                  categoryTotals
                )
              )
            }
            بوده.
          `
          : `
            هنوز داده‌ای برای
            تحلیل وجود ندارد.
          `
        }

      </p>

    </div>
  `;

            /* WEEKLY */

            renderWeeklyChart(
                expenseTransactions
            );

        }

        /* =========================
           WEEKLY CHART
        ========================= */

        function renderWeeklyChart(
            transactions
        ) {

            const days = [0, 0, 0, 0, 0, 0, 0];

            transactions.forEach((t) => {

                const day =
                    new Date(
                        t.createdAt
                    ).getDay();

                days[day] += t.amount;

            });

            weeklyChart.innerHTML = '';

            days.forEach((amount) => {

                const bar =
                    document.createElement('div');

                bar.classList.add('bar');

                const max =
                    Math.max(...days, 1);

                const height =
                    (amount / max) * 100;

                bar.innerHTML =

                    `
      <div
        style="
          height:${height}%
        "
      ></div>
    `;

                weeklyChart.appendChild(bar);

            });

        }

        /* =========================
           BUDGETS
        ========================= */

        function renderBudgets() {

            const budgets = {

                food: 10000000,

                transport: 5000000,

                shopping: 7000000,

                fun: 4000000

            };

            budgetContainer.innerHTML = '';

            Object.keys(budgets).forEach(
                (category) => {

                    const spent =
                        state.transactions
                        .filter((t) => {

                            return (
                                t.category === category &&
                                t.type === 'expense'
                            );

                        })
                        .reduce((acc, item) => {

                            return acc + item.amount;

                        }, 0);

                    const limit =
                        budgets[category];

                    const percent =
                        Math.min(
                            (spent / limit) * 100,
                            100
                        );

                    const card =
                        document.createElement('div');

                    card.classList.add(
                        'glass',
                        'budget-card'
                    );

                    card.innerHTML =

                        `
        <div class="budget-info">

          <h3>
            ${translateCategory(
              category
            )}
          </h3>

          <p>

            ${formatMoney(spent)}
            /

            ${formatMoney(limit)}

          </p>

        </div>

        <div class="budget-progress">

          <div
            class="budget-progress-fill"
            style="
              width:${percent}%
            "
          ></div>

        </div>

      `;

                    budgetContainer.appendChild(
                        card
                    );

                });

        }

        /* =========================
           AI
        ========================= */

        function renderAI() {

            aiChatBox.innerHTML =

                `
    <div class="ai-message">

      <div class="ai-avatar">

        <i class="
          fa-solid fa-brain
        "></i>

      </div>

      <div class="message-content">

        <h4>
          Finora AI
        </h4>

        <p>

          ${
            state.transactions.length
            ? `
              تا الان
              ${formatMoney(
                getTotalExpenses()
              )}
              تومان خرج کردی.
            `
            : `
              هنوز تراکنشی ثبت نکردی.
            `
          }

        </p>

      </div>

    </div>
  `;

        }

        /* =========================
           AI CHAT
        ========================= */

        function setupAI() {

            sendAiBtn.addEventListener(
                'click',
                sendAIMessage
            );

        }

        function sendAIMessage() {

            const value =
                aiInput.value.trim();

            if (!value) return;

            const userMessage =
                document.createElement('div');

            userMessage.classList.add(
                'user-message'
            );

            userMessage.innerHTML =

                `
    <div class="message-content">

      <p>${value}</p>

    </div>
  `;

            aiChatBox.appendChild(
                userMessage
            );

            setTimeout(() => {

                const aiMessage =
                    document.createElement('div');

                aiMessage.classList.add(
                    'ai-message'
                );

                aiMessage.innerHTML =

                    `
      <div class="ai-avatar">

        <i class="
          fa-solid fa-sparkles
        "></i>

      </div>

      <div class="message-content">

        <h4>
          Finora AI
        </h4>

        <p>

          مدیریت هزینه‌های روزانه
          و تعیین بودجه هفتگی
          بهترین راه کنترل مالیه ✨

        </p>

      </div>
    `;

                aiChatBox.appendChild(
                    aiMessage
                );

                aiChatBox.scrollTop =
                    aiChatBox.scrollHeight;

            }, 700);

            aiInput.value = '';

        }

        /* =========================
           THEME
        ========================= */

        function setupTheme() {

            if (state.theme === 'light') {

                document.body.classList.add(
                    'light-mode'
                );

                if (themeToggle) {

                    themeToggle.checked = false;

                }

            }

        }

        function setupThemeToggle() {

            if (!themeToggle) return;

            themeToggle.addEventListener(
                'change',
                () => {

                    document.body.classList.toggle(
                        'light-mode'
                    );

                    state.theme =
                        document.body.classList.contains(
                            'light-mode'
                        ) ?
                        'light' :
                        'dark';

                    localStorage.setItem(
                        'theme',
                        state.theme
                    );

                }
            );

        }

        /* =========================
           HELPERS
        ========================= */

        function formatMoney(number) {

            return Number(number)
                .toLocaleString('fa-IR');

        }

        function translateCategory(
            category
        ) {

            const map = {

                food: 'خوراک',

                transport: 'حمل و نقل',

                shopping: 'خرید',

                fun: 'سرگرمی',

                salary: 'حقوق',

                other: 'سایر'

            };

            return map[category] || category;

        }

        function getTopCategory(obj) {

            return Object.keys(obj).reduce(
                (a, b) => {

                    return obj[a] > obj[b] ?
                        a :
                        b;

                }
            );

        }

        function getTotalExpenses() {

            return state.transactions
                .filter((t) => {

                    return t.type === 'expense';

                })
                .reduce((acc, item) => {

                    return acc + item.amount;

                }, 0);

        }
    </script>

</body>

</html>
